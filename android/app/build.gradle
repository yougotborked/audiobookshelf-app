plugins {
  id 'com.android.application'
  id 'kotlin-android'
}

kotlin {
  jvmToolchain(17)
}

android {
  namespace = 'com.audiobookshelf.app'
  buildFeatures {
    viewBinding = true
    buildConfig = true
  }
  kotlinOptions {
    freeCompilerArgs = ['-Xjvm-default=all']
    // Align Kotlin JVM target with Java toolchain (Java 17)
    jvmTarget = '17'
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  lint {
    abortOnError = false
    warningsAsErrors = false
    checkDependencies = false
    disable 'GradleDependency'
    baseline = file('lint-baseline.xml')
  }
  compileSdk rootProject.ext.compileSdkVersion
  signingConfigs {
    debug {
      storeFile rootProject.file('debug.keystore')
      storePassword 'android'
      keyAlias 'androiddebugkey'
      keyPassword 'android'
    }
  }
  defaultConfig {
    applicationId "com.audiobookshelf.app"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 116
    versionName "0.12.0-beta"
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    manifestPlaceholders = [
      "appAuthRedirectScheme": "com.audiobookshelf.app"
    ]
    aaptOptions {
      // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
      // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
      ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
  }
  buildTypes {
    debug {
      applicationIdSuffix ".debug"
      versionNameSuffix "-debug"
      minifyEnabled false
      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
    }
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
    }
  }
}

repositories {
  flatDir {
    dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
  }
  mavenCentral()
}

configurations.configureEach {
  resolutionStrategy {
    force("com.google.android.gms:play-services-base:18.0.1")
    force("androidx.appcompat:appcompat:$androidxAppCompatVersion")
    force("androidx.core:core-ktx:$androidx_core_ktx_version")
    force("androidx.media:media:$androidx_media_version")
    force("org.jetbrains.kotlinx:kotlinx-coroutines-core:$kotlin_coroutines_version")
    force("org.jetbrains.kotlinx:kotlinx-coroutines-android:$kotlin_coroutines_version")
  }
}

dependencies {
  implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
  implementation project(':capacitor-android')

  implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
  implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"

  if (findProject(':capacitor-cordova-android-plugins') != null) {
    implementation project(':capacitor-cordova-android-plugins')
  }

  implementation "androidx.core:core-ktx:$androidx_core_ktx_version"

  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:$kotlin_coroutines_version"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$kotlin_coroutines_version"

  implementation "androidx.media:media:$androidx_media_version"

  // Media3 (replaces ExoPlayer 2 — see android/media3-migration branch)
  implementation "androidx.media3:media3-exoplayer:$media3_version"
  implementation "androidx.media3:media3-exoplayer-hls:$media3_version"
  implementation "androidx.media3:media3-session:$media3_version"
  implementation "androidx.media3:media3-ui:$media3_version"
  implementation "androidx.media3:media3-cast:$media3_version"

  // Glide for images (no annotation processor needed — GlideApp generated API unused)
  implementation "com.github.bumptech.glide:glide:$glide_version"

  // Paper NoSQL Db
  implementation 'io.github.pilgr:paperdb:2.7.2'

  // Simple Storage
  implementation "com.anggrayudi:storage:1.5.6"

  // OK HTTP
  implementation 'com.squareup.okhttp3:okhttp:4.12.0'

  // Jackson for JSON
  implementation 'com.fasterxml.jackson.module:jackson-module-kotlin:2.18.3'

  testImplementation "org.robolectric:robolectric:4.13"
  testImplementation "junit:junit:$junit_version"
}

tasks.register('staticAnalysis') {
  group = 'verification'
  description = 'Runs static analysis checks.'
  dependsOn('lint')
}

tasks.named('check') {
  dependsOn('staticAnalysis')
}

apply from: 'capacitor.build.gradle'
