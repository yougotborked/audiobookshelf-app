name: Build APK

on:
  push:
    paths-ignore:
      - 'ios/**'
      - 'readme.md'
  pull_request:
    paths-ignore:
      - 'ios/**'
      - 'readme.md'

# Minimize default token and avoid unneeded scopes
permissions:
  contents: read

# Cancel superseded runs per ref to save minutes
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Use Node.js 24.x with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # Nuxt deps
      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt project (static)
        run: npm run generate

      - name: Copy web to Android (Capacitor)
        run: npx cap sync

      # Single source of truth for Gradle caching & config-cache
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Setup debug keystore
        run: |
          mkdir -p "$HOME/.android"
          cp android/debug.keystore "$HOME/.android/debug.keystore"

      # Run both tasks in one Gradle invocation so task outputs/configuration state can be reused
      # within the same build execution instead of crossing invocation boundaries.
      - name: Run static analysis + build Android app (Debug)
        working-directory: android
        run: ./gradlew --no-daemon --build-cache --configuration-cache staticAnalysis assembleDebug

      - name: Rename APK with timestamp + short SHA
        working-directory: android/app/build/outputs/apk/debug/
        run: |
          build="$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          name="audiobookshelf-${build}.apk"
          mv -v app-debug.apk "${name}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiobookshelf-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: main
    runs-on: ubuntu-latest
    # Only publish for commits pushed to the master branch
    if: github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: audiobookshelf-apk
          path: ./ghpages

      - name: Prepare test page resources
        run: |
          mkdir -p ghpages
          # copy logo + template from the repo into the ghpages folder
          cp static/Logo.png ghpages/logo.png || true
          cp .github/testing-page-template.html ghpages/index.html

      - name: Build test page
        working-directory: ghpages
        run: |
          sed -i "s/__DATE__/$(date)/g" index.html
          sed -i "s/__COMMIT__/$(git rev-parse --short HEAD)/g" index.html
          sed -i "s/__APK__/$(ls *apk | xargs -n1 basename)/g" index.html
          # Replace repository placeholder so forks point to their own repo (owner/name)
          sed -i "s|__REPO__|${GITHUB_REPOSITORY}|g" index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ghpages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  release:
    needs: main
    runs-on: ubuntu-latest
    # Only publish releases for commits pushed to master
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: audiobookshelf-apk
          path: ./apk

      - name: Get APK filename and commit info
        id: info
        run: |
          echo "apk=$(ls apk/*.apk | head -1)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      # Delete the existing 'latest' tag+release (if any) then recreate it.
      # This keeps the Releases page to a single entry instead of accumulating
      # one release per commit. Force-pushing a tag to master is safe here
      # because 'latest' is a rolling pointer, not a semantic version.
      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
      - name: Create 'latest' release and attach APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'Debug APK built from `master` at %s\n\nCommit: [%s](https://github.com/%s/commit/%s)\n\n> This release is automatically overwritten on every push to master.\n' \
            "${{ steps.info.outputs.date }}" \
            "${{ steps.info.outputs.sha }}" \
            "${{ github.repository }}" \
            "${{ github.sha }}" > release-notes.md
          gh release create latest \
            --title "Latest build (${{ steps.info.outputs.sha }})" \
            --notes-file release-notes.md \
            --prerelease \
            "${{ steps.info.outputs.apk }}"
